<style>
  :root {

  .page { display: flex; flex-direction: column; min-height: 100vh; }

  header.topbar .meta { font-size: 11px; color: var(--muted2); }
  header.topbar .meta .dot {

  .dot.ok { background: var(--ok); }
  .dot.dead { background: var(--t3); }
  .crumb { padding: 12px 24px 0; font-size: 11px; color: var(--muted); }
  .crumb a { color: var(--accent); cursor: pointer; }
  .crumb a:hover { text-decoration: underline; }
  main { flex: 1; padding: 16px 24px 110px; overflow: auto; }
  .agents-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .agent-tile {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .agent-tile:hover {

  .agent-tile.t3 { border-left: 3px solid var(--t3); }
  .agent-tile.t2 { border-left: 3px solid var(--t2); }

  .agent-name { font-size: 13px; font-weight: 600; margin: 0; line-height: 1.3; }

  .agent-arrow { color: var(--muted2); font-size: 14px; }
  .tier-row {
    display: flex; gap: 10px;

  .tier-block { flex: 1; text-align: left; }

  .pill.t1 { color: var(--t1); border-color: var(--t1); background: var(--t1-bg); }
  .agent-foot { font-size: 10px; color: var(--muted2); margin-top: auto; }

  .dd-header {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px;

  .dd-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .dd-sub { font-size: 12px; color: var(--muted); }
  .dd-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
  .dd-kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .dd-kpi .label {

<div class="page">
  <header class="topbar">
    <div>
      <h1>morpheus · ds ops command center</h1>
      <div style="font-size: 10px; color: var(--muted2); margin-top: 2px;">
        11 agents · uae · cadence-driven
      </div>
    </div>
    <div class="meta" id="status">connecting…</div>
  </header>
  <div class="crumb" id="crumb"></div>
  <main id="view"></main>
</div>
<div class="bottom-strip" id="strip"></div>

<script>
const API = "http://127.0.0.1:5001/api";

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" }, ...opts,
  });
  if (!res.ok) throw new Error(res.status + " " + path);
  return res.json();
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}
function fmt(v, d = 1) {
  if (v === null || v === undefined || v === "") return "—";
  if (typeof v !== "number") v = Number(v);
  if (isNaN(v)) return "—";
  return v.toLocaleString(undefined, { maximumFractionDigits: d, minimumFractionDigits: d });
}
function fmtInt(v) {
  if (v === null || v === undefined) return "—";
  const n = Number(v);
  return isNaN(n) ? "—" : n.toLocaleString();
}
function fmtMoney(v) {
  if (v === null || v === undefined) return "—";
  return "$" + Math.round(Number(v)).toLocaleString();
}
function ago(ts) {
  if (!ts) return "never";
  const d = new Date(ts);
  const mins = Math.round((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  if (mins < 1440) return Math.round(mins / 60) + "h ago";
  return Math.round(mins / 1440) + "d ago";
}

async function loadHealth() {
  const el = document.getElementById("status");
  try {
    const h = await api("/health");
    el.innerHTML = `<span class="dot ok"></span>online · ${h.geo} · ${new Date(h.now).toLocaleTimeString()}`;
  } catch (e) {
    el.innerHTML = `<span class="dot dead"></span>backend offline · start flask on :5001`;
  }
}

async function loadStrip() {
  const el = document.getElementById("strip");
  try {
    const m = await api("/platform_health");
    const cells = [
      { label: "p95 fulfilment",      value: fmt(m.p95_fulfillment_mins, 1),                 sub: "min · fulfilling → fulfilled" },
      { label: "p95 fulfil → delivery", value: fmt(m.p95_fulfilled_to_delivered_mins, 1),    sub: "min · last-mile" },
      { label: "% defects",           value: fmt(m.pct_defects?.pct, 2) + "%",               sub: `${fmtInt(m.pct_defects?.defects)} of ${fmtInt(m.pct_defects?.orders)}` },
      { label: "% skips",             value: fmt(m.pct_skips?.pct, 2) + "%",                 sub: `${fmtInt(m.pct_skips?.skips)} of ${fmtInt(m.pct_skips?.picked)}` },
      { label: "fefo losses",         value: fmtMoney(m.fefo_losses?.value),                 sub: `${fmtInt(m.fefo_losses?.skus_breached)} skus` },
      { label: "audit pass %",        value: fmt(m.audit_pct_pass?.pct, 1) + "%",            sub: `${m.audit_pct_pass?.pass}/${m.audit_pct_pass?.total} stores` },
      { label: "ambient putaway",     value: fmt(m.putaway_adherence?.ambient_pct, 1) + "%", sub: "≤ 360 min sla" },
      { label: "frozen putaway",      value: fmt(m.putaway_adherence?.frozen_pct, 1) + "%",  sub: "≤ 30 min sla" },
      { label: "chilled putaway",     value: fmt(m.putaway_adherence?.chilled_pct, 1) + "%", sub: "≤ 60 min sla" },
      { label: "stocktake adh",       value: fmt(m.stocktake_adherence?.pct, 1) + "%",       sub: `${fmtInt(m.stocktake_adherence?.completed)} of ${fmtInt(m.stocktake_adherence?.overall)}` },
    ];
    el.innerHTML = cells.map(c => `
      <div class="kpi-cell">
        <div class="label">${c.label}</div>
        <div class="value">${c.value}</div>
        <div class="sub">${c.sub}</div>
      </div>`).join("");
  } catch (e) {
    el.innerHTML = `<div class="kpi-cell"><div class="label">platform health</div><div class="value">—</div><div class="sub">backend offline</div></div>`;
  }
}

let agentsCache = null, alertsCache = null, dsRoutingCache = null;

async function ensureCaches() {
  if (!agentsCache) agentsCache = await api("/agents");
  if (!alertsCache) alertsCache = await api("/alerts?hours=48&limit=5000");
  if (!dsRoutingCache) {
    const arr = await api("/routing/ds");
    dsRoutingCache = Object.fromEntries(arr.map(r => [r.ds_code, r]));
  }
}

function route() {
  const hash = (location.hash || "").replace(/^#/, "");
  if (hash.startsWith("agent_")) renderDeepDive(hash);
  else renderMain();
}

async function renderMain() {
  document.getElementById("crumb").innerHTML = "";
  const el = document.getElementById("view");
  el.innerHTML = `<div class="empty">loading agents…</div>`;
  try {
    await ensureCaches();
    const byAgent = {};
    for (const a of alertsCache) (byAgent[a.agent] = byAgent[a.agent] || []).push(a);
    el.innerHTML = `<div class="agents-grid">
      ${agentsCache.map(a => renderTile(a, byAgent[a.id] || [])).join("")}
    </div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">cannot reach api · ${escapeHtml(e.message)}</div>`;
  }
}

// agent display name overrides + tile-card metric label
const AGENT_DISPLAY = {
  agent_10_skips_stocktake: "incident stocktake % adherence",
};

function renderTile(a, alerts) {
  const c = a.counts_48h || {};
  const t3 = c.t3 || 0, t2 = c.t2 || 0, t1 = c.t1 || 0;
  const cls = t3 > 0 ? "t3" : t2 > 0 ? "t2" : t1 > 0 ? "t1" : "idle";
  const lr = a.last_run || {};
  const sortedAlerts = (alerts || []).slice().sort((x, y) => (y.tier || 0) - (x.tier || 0));
  const top3 = sortedAlerts.slice(0, 3).map(r => {
    const code = r.ds_code || r.vendor_shortcode || "—";
    return `<div class="br">
      <span class="pill t${r.tier}">t${r.tier}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(code)}</span>
    </div>`;
  }).join("") || `<div style="font-size:10.5px;color:var(--muted2);font-style:italic">no breaches in window</div>`;
  const display = AGENT_DISPLAY[a.id] || a.name;
  return `<div class="agent-tile ${cls}" onclick="location.hash='${a.id}'">
    <div class="agent-header">
      <div>
        <div class="agent-name">${escapeHtml(display)}</div>
        <div class="agent-cadence">${a.cadence} · ${ago(lr.completed_at)}</div>
      </div>
      <div class="agent-arrow">→</div>
    </div>
    <div class="tier-row">
      <div class="tier-block t3"><div class="label">t3</div><div class="value">${t3}</div></div>
      <div class="tier-block t2"><div class="label">t2</div><div class="value">${t2}</div></div>
      <div class="tier-block t1"><div class="label">t1</div><div class="value">${t1}</div></div>
    </div>
    <div class="agent-breaches">
      <div class="label">top breaches</div>${top3}
    </div>
    <div class="agent-foot">id ${a.id}</div>
  </div>`;
}

// per-agent column specs for deep-dive table
const COLUMNS = {

    ],
    picker_cols: [

      ["payload.user_name", "picker"], ["payload.iph", "iph", "num"],

  },
  agent_03_iph_putaway: {
    cols: [

      ["payload.fefo_pct_orders", "% of orders", "pct2"],
      ["payload.breach_units", "units", "num"],
      ["payload.ex_nl_value", "$ value", "money"],
    ],
  },
  agent_07_adjustments: {
    cols: [
      ["tier", "tier"], ["ds_code", "ds"], ["payload.ds_name", "name"],
      ["am_name", "am"], ["asst_mgr", "supervisor"], ["tl_name", "tl"],
      ["payload.adj_value", "adj $", "money"], ["payload.live_inv_value", "live inv $", "money"],
      ["payload.adj_pct", "%", "pct3"],
    ],
  },
  agent_08_putaway_delays: {
    cols: [
      ["tier", "tier"], ["ds_code", "ds"], ["payload.ds_name", "name"],
      ["am_name", "am"], ["asst_mgr", "supervisor"], ["tl_name", "tl"],
      ["payload.storage_type", "storage"],
      ["payload.total_pending", "total pending", "num"],
      ["payload.breach_qty", "breach qty", "num"],
      ["payload.breach_pct", "breach %", "pct1"],
    ],
  },
  agent_09_missing_inventory: {
    cols: [
      ["tier", "tier"], ["ds_code", "ds"], ["ds_name", "name"],
      ["am_name", "am"], ["asst_mgr", "supervisor"], ["tl_name", "tl"],
      ["payload.missing_qty", "missing items", "num"],
      ["payload.missing_value", "$ value", "money"],
      ["payload.store_gmv", "store gmv", "money"],
      ["payload.missing_value_pct", "% of gmv", "pct3"],
    ],
  },
  agent_10_skips_stocktake: {
    cols: [
      ["tier", "tier"], ["ds_code", "ds"], ["ds_name", "name"],
      ["am_name", "am"], ["asst_mgr", "supervisor"], ["tl_name", "tl"],
      ["payload.jobs_created", "jobs created", "num"], ["payload.jobs_completed", "completed", "num"],
      ["payload.jobs_adherence_pct", "jobs adh %", "pct1"],
      ["payload.qty_created", "qty created", "num"], ["payload.qty_completed", "qty done", "num"],
      ["payload.qty_adherence_pct", "qty adh %", "pct1"],
    ],
  },
  agent_11_audit_scores: {
    cols: [
      ["tier", "tier"], ["ds_code", "ds"], ["payload.ds_name", "name"],
      ["am_name", "am"], ["asst_mgr", "supervisor"], ["tl_name", "tl"],
      ["payload.score1", "score1", "num"], ["payload.score2", "w-1", "num"],
      ["payload.score3", "w-2", "num"], ["payload.score4", "w-3", "num"],
      ["payload.fails_in_4w", "fails 4w", "num"],
    ],
  },
};

const SUB_TABS_BY_AGENT = {
  // d0 (today) first, then d-1
  agent_01_attendance: ["cc_today", "temp_today", "vendor_today", "cc_d1", "temp_d1", "vendor_d1"],
  agent_02_iph_pickers: ["overall_d0", "picker_d0", "overall_d1", "picker_d1"],
  agent_03_iph_putaway: ["overall_d0", "picker_d0", "overall_d1", "picker_d1"],
  agent_04_skips_picker: ["store", "picker"],
};

// pretty label for sub-tab pills (e.g. "cc_d1" → "cc d-1", "overall_d0" → "overall d0")
function labelSubTab(s) {
  return s.replace("_d1", " d-1")
          .replace("_d0", " d0")
          .replace("_today", " today")
          .replace(/_/g, " ");
}

const SUB_TAB_COL_KEY = {
  agent_01_attendance: (st) => st.startsWith("vendor_") ? "vendor_cols" : "cols",
  agent_02_iph_pickers: (st) => st.startsWith("picker_") ? "picker_cols" : "cols",
  agent_03_iph_putaway: (st) => st.startsWith("picker_") ? "picker_cols" : "cols",
  agent_04_skips_picker: (st) => st === "picker" ? "picker_cols" : "cols",
};

const subTabState = {};

function pickValue(row, path) {
  if (path === "tier" || path === "ds_code" || path === "vendor_shortcode") return row[path];
  if (path.startsWith("payload.")) return row.payload?.[path.slice(8)];
  // ds_name + ds_routing keys: prefer payload, fall back to ds_routing cache
  if (path === "ds_name") {
    return row.payload?.ds_name
        ?? (row.ds_code ? dsRoutingCache?.[row.ds_code]?.ds_name : null)
        ?? null;
  }
  if (["am_name","asst_mgr","supervisor","tl_name"].includes(path)) {
    const ds = row.ds_code; if (!ds) return null;
    return dsRoutingCache?.[ds]?.[path] ?? null;
  }
  return null;
}

function fmtCell(val, kind) {
  if (val === null || val === undefined || val === "") return '<span style="color:var(--muted2)">—</span>';
  if (kind === "num") return fmtInt(val);
  if (kind === "pct1") return fmt(val, 1) + "%";
  if (kind === "pct2") return fmt(val, 2) + "%";
  if (kind === "pct3") return fmt(val, 3) + "%";
  if (kind === "money") return fmtMoney(val);
  return escapeHtml(String(val));
}

async function renderDeepDive(agentId) {
  document.getElementById("crumb").innerHTML = `<a onclick="location.hash=''">← all agents</a>`;
  const el = document.getElementById("view");
  el.innerHTML = `<div class="empty">loading ${agentId}…</div>`;
  try {
    await ensureCaches();
    const agent = agentsCache.find(a => a.id === agentId);
    if (!agent) {
      el.innerHTML = `<div class="empty">unknown agent ${escapeHtml(agentId)}</div>`;
      return;
    }
    const alerts = alertsCache.filter(x => x.agent === agentId);
    el.innerHTML = renderDeepHtml(agent, alerts);
  } catch (e) {
    el.innerHTML = `<div class="empty">error · ${escapeHtml(e.message)}</div>`;
  }
}

function renderDeepHtml(agent, alerts) {
  const c = agent.counts_48h || {};
  const t3 = c.t3 || 0, t2 = c.t2 || 0, t1 = c.t1 || 0;
  const lr = agent.last_run || {};
  const subTabList = SUB_TABS_BY_AGENT[agent.id];
  const subTab = subTabState[agent.id] || (subTabList && subTabList[0]) || null;
  const filtered = subTabList ? alerts.filter(a => a.sub_tab === subTab) : alerts;
  // sort t3 → t2 → t1, then by metric desc
  filtered.sort((a, b) => {
    if ((b.tier || 0) !== (a.tier || 0)) return (b.tier || 0) - (a.tier || 0);
    return (b.metric_value || 0) - (a.metric_value || 0);
  });

  const subTabsHtml = subTabList ? `<div class="sub-tabs">
    ${subTabList.map(t =>
      `<span class="sub-tab ${t === subTab ? 'active' : ''}" onclick="setSub('${agent.id}','${t}')">${labelSubTab(t)}</span>`
    ).join("")}
  </div>` : "";

  const colKeyFn = SUB_TAB_COL_KEY[agent.id];
  const colKey = (subTab && colKeyFn) ? colKeyFn(subTab) : "cols";
  const colSpec = (COLUMNS[agent.id] && (COLUMNS[agent.id][colKey] || COLUMNS[agent.id].cols)) || [];

  const headRow = colSpec.map(c => `<th class="${c[2] === 'num' || c[2]?.startsWith('pct') || c[2] === 'money' ? 'num' : ''}">${c[1]}</th>`).join("") + "<th>action</th>";

  const tableRows = filtered.length ? filtered.map(r => {
    const cells = colSpec.map(c => {
      const v = c[0] === "tier" ? `<span class="pill t${r.tier}">t${r.tier}</span>` : fmtCell(pickValue(r, c[0]), c[2]);
      const cls = (c[2] === 'num' || c[2]?.startsWith('pct') || c[2] === 'money') ? 'num' : '';
      return `<td class="${cls}">${v}</td>`;
    }).join("");
    const draftBtn = r.draft_id
      ? `<button class="draft-btn has-draft" disabled title="draft already created">drafted</button>`
      : `<button class="draft-btn" onclick="createDraft(${r.id}, this)">create draft</button>`;
    return `<tr class="t${r.tier}">${cells}<td>${draftBtn}</td></tr>`;
  }).join("") : `<tr><td colspan="${colSpec.length + 1}"><div class="empty">no breaches in window</div></td></tr>`;

  return `<div class="dd-header">
    <h2 class="dd-title">${escapeHtml(AGENT_DISPLAY[agent.id] || agent.name)}</h2>
    <div class="dd-sub">${agent.cadence} · ${agent.id} · last run ${lr.completed_at ? new Date(lr.completed_at).toLocaleString() : "never"} · scanned ${lr.rows_scanned ?? 0} rows</div>
  </div>
  <div class="dd-kpis">
    <div class="dd-kpi"><div class="label">t3 critical</div><div class="value t3">${t3}</div></div>
    <div class="dd-kpi"><div class="label">t2 watch</div><div class="value t2">${t2}</div></div>
    <div class="dd-kpi"><div class="label">t1 floor</div><div class="value t1">${t1}</div></div>
  </div>
  ${subTabsHtml}
  <div class="dd-section">
    <div class="dd-label">breaches · sorted t3 → t1</div>
    <table class="dd-table"><thead><tr>${headRow}</tr></thead>
      <tbody>${tableRows}</tbody></table>
  </div>`;
}

function setSub(agentId, t) {
  subTabState[agentId] = t;
  renderDeepDive(agentId);
}

async function createDraft(alertId, btn) {
  btn.disabled = true; btn.textContent = "drafting…";
  try {
    await api(`/alerts/${alertId}/draft`, { method: "POST" });
    btn.classList.add("has-draft"); btn.textContent = "drafted";
  } catch (e) {
    alert("draft failed: " + e.message);
    btn.disabled = false; btn.textContent = "create draft";
  }
}

window.addEventListener("hashchange", () => {
  agentsCache = null; alertsCache = null;
  route();
});
async function refreshAll() {
  agentsCache = null; alertsCache = null; dsRoutingCache = null;
  await Promise.all([loadHealth(), loadStrip(), route()]);
}
refreshAll();
setInterval(refreshAll, 60_000);
</script>
